name: well_nest
description: "WellNest - Family Healthcare Management App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  
  # Routing
  go_router: ^14.8.1
  
  # Local Storage
  hive_flutter: ^1.1.0
  
  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  equatable: ^2.0.7
  
  # HTTP Client
  dio: ^5.7.0
  
  # UI Components
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  
  # File Handling
  file_picker: ^8.1.7
  path_provider: ^2.1.5
  
  # Date/Time
  table_calendar: ^3.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.15
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
