name: well_nest
description: "WellNest - Family Healthcare Management App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.3
  cloud_firestore: ^5.6.6
  firebase_storage: ^12.4.4
  firebase_messaging: ^15.2.3
  
  # State Management
  flutter_riverpod: ^2.6.1
  
  # Navigation
  go_router: ^14.8.1
  
  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  equatable: ^2.0.7
  
  # UI Components
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  
  # Local Storage
  shared_preferences: ^2.3.5
  flutter_local_notifications: ^18.0.1
  
  # Image Picker
  image_picker: ^1.1.2
  
  # File Handling
  path_provider: ^2.1.5
  file_picker: ^8.1.7
  
  # Date/Time
  table_calendar: ^3.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  
  # Testing
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
